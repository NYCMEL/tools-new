name: Update stock scanner data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-stock-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stock data
        run: python tools/update_stocks.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json

          if git diff --cached --quiet; then
            echo "No stock data changes to commit."
          else
            git commit -m "Update stock scanner data"
            git push
          fi
