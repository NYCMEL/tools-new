const STORAGE_KEY="mtk-gallery-paintings-v3",OFFERS_KEY="mtk-gallery-offers-v3",REQUESTS_KEY="mtk-gallery-requests-v3";
class MTKGallery{
constructor(root,settings){this.root=root;this.config=settings;this.paintings=this.loadPaintings();this.isAdmin=false;this.editingId=null;this.render();wc.subscribe("4-mtk-gallery",this.onMessage.bind(this));this.publish("ready",{count:this.paintings.length})}
loadPaintings(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(this.config.paintings))}catch(e){return JSON.parse(JSON.stringify(this.config.paintings))}}
savePaintings(){localStorage.setItem(STORAGE_KEY,JSON.stringify(this.paintings));this.publish("paintings:saved",{count:this.paintings.length})}
publish(action,payload){const message={component:"mtk-gallery",action,date:new Date().toISOString(),...(payload||{})};wc.log("mtk-gallery publish",message);wc.publish("mtk-gallery",message)}
onMessage(event){const detail=event.detail||{};wc.log("mtk-gallery received",detail);if(detail.action==="refresh"){this.paintings=this.loadPaintings();this.renderHome()}}
render(){this.root.innerHTML=`<section class="mtk-gallery__shell" aria-label="Artwork gallery"><header class="mtk-gallery__topbar"><div><h1 class="mtk-gallery__title">${this.escape(this.config.store.title)}</h1><p class="mtk-gallery__subtitle">${this.escape(this.config.store.subtitle)}</p></div><button class="mtk-gallery__manage" type="button" data-action="open-admin">Manage Artwork</button></header><main class="mtk-gallery__grid" data-gallery-grid></main></section><section class="mtk-gallery__overlay" aria-hidden="true" data-detail-overlay><button class="mtk-gallery__close" type="button" data-action="close-detail" aria-label="Close artwork detail">×</button><div data-detail-content></div></section><section class="mtk-gallery__overlay" aria-hidden="true" data-admin-overlay><button class="mtk-gallery__close" type="button" data-action="close-admin" aria-label="Close admin management">×</button><div class="mtk-gallery__admin" data-admin-content></div></section>`;this.bindEvents();this.renderHome();this.renderAdmin()}
bindEvents(){this.root.addEventListener("click",e=>{const action=e.target.closest("[data-action]");const card=e.target.closest("[data-painting-id]");if(action){this.handleAction(action.dataset.action,action.dataset.id);return}if(card)this.openDetail(card.dataset.paintingId)});this.root.addEventListener("change",e=>{const input=e.target;if(input&&input.name==="imageUpload"&&input.files&&input.files[0]){const label=this.root.querySelector("[data-upload-filename]");if(label)label.textContent=input.files[0].name;this.handleImageUpload(input)}});this.root.addEventListener("input",e=>{const input=e.target;if(input&&input.name==="image"){const preview=this.root.querySelector("[data-image-preview]");if(preview)preview.setAttribute("src",input.value||"")}});this.root.addEventListener("submit",e=>{e.preventDefault();const form=e.target,type=form.dataset.form;if(type==="offer")this.submitRecord(form,OFFERS_KEY,"offer:created","Offer saved locally.");if(type==="request")this.submitRecord(form,REQUESTS_KEY,"request:created","Request saved locally.");if(type==="login")this.login(form);if(type==="painting")this.savePainting(form)});document.addEventListener("keydown",e=>{if(e.key==="Escape"){this.closeDetail();this.closeAdmin()}})}
handleImageUpload(input){
const file=input.files[0];
if(!file)return;
if(!file.type.startsWith("image/")){
alert("Please upload a valid image file.");
input.value="";
return;
}
const relativePath="./img/"+file.name;
const form=input.closest("form");
const imageField=form?form.querySelector("[name=image]"):null;
const preview=form?form.querySelector("[data-image-preview]"):null;
const fileLabel=this.root.querySelector("[data-upload-filename]");
if(imageField)imageField.value=relativePath;
if(preview)preview.setAttribute("src",relativePath);
if(fileLabel)fileLabel.textContent=file.name;
alert("IMPORTANT:

Copy this image into your ./img/ folder:

"+file.name+"

The gallery only stores relative image URLs.");
this.publish("image:selected",{name:file.name,path:relativePath});
};
const STORAGE_KEY=`);
exported=exported.replace(/localStorage\.getItem\(STORAGE_KEY\);return s\?JSON\.parse\(s\):JSON\.parse\(JSON\.stringify\(this\.config\.paintings\)\)/,'localStorage.getItem(STORAGE_KEY);return JSON.parse(JSON.stringify(this.config.paintings))');
const blob=new Blob(["<!DOCTYPE html>\\n"+exported],{type:"text/html;charset=utf-8"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="index.html";
document.body.appendChild(a);
a.click();
a.remove();
URL.revokeObjectURL(url);
this.publish("gallery:exported",{count:this.paintings.length});
}
field(name,label,type,required,value=""){const id="field-"+name;return`<div class="mtk-gallery__field"><label for="${this.escape(id)}">${this.escape(label)}</label><input id="${this.escape(id)}" name="${this.escape(name)}" type="${this.escape(type)}" ${required?"required":""} value="${this.escape(String(value??""))}"></div>`}
textarea(name,label,required){const id="field-"+name;return`<div class="mtk-gallery__field"><label for="${this.escape(id)}">${this.escape(label)}</label><textarea id="${this.escape(id)}" name="${this.escape(name)}" ${required?"required":""}></textarea></div>`}
money(v){return new Intl.NumberFormat("en-US",{style:"currency",currency:this.config.store.currency||"USD",maximumFractionDigits:0}).format(Number(v||0))}
escape(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
}
function init(){const root=document.querySelector("mtk-gallery.mtk-gallery");if(!root||root.dataset.initialized==="true")return;root.dataset.initialized="true";new MTKGallery(root,config)}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init,{once:true});else init();
})();
</script>
</body>
