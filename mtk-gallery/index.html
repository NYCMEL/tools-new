.mtk-gallery__title{margin:0;font-size:clamp(2rem,5vw,4.5rem);line-height:.95;font-weight:900;letter-spacing:-.05em;color:#111827}

.mtk-gallery__header-description{margin:16px 0 0;padding-top:0;color:#1f2937;font-size:.92rem;line-height:1.6;max-width:880px;opacity:var(--mtk-header-desc-opacity);max-height:var(--mtk-header-desc-max);overflow:hidden;transition:opacity .18s linear,max-height .18s linear,margin .18s linear,padding .18s linear;will-change:opacity,max-height}
.mtk-gallery__topbar[data-scrolled="true"] .mtk-gallery__header-description{margin-top:0!important;padding-top:0!important}
.mtk-gallery__manage,.mtk-gallery__primary{border:0;background:#1a73e8;color:#fff;padding:12px 18px;border-radius:999px;cursor:pointer;font-weight:800;box-shadow:0 2px 8px rgba(26,115,232,.24);white-space:nowrap}
.mtk-gallery__manage:hover,.mtk-gallery__primary:hover{background:#1558b0}
.mtk-gallery__secondary,.mtk-gallery__danger{border:1px solid #dadce0;background:#fff;color:#202124;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:800}
.mtk-gallery__danger{border-color:#d93025;color:#d93025}
.mtk-gallery__grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;flex:1;margin-top:26px}
.mtk-gallery__card{border:1px solid #e8eaed;border-radius:24px;overflow:hidden;background:#fff;cursor:pointer;box-shadow:0 2px 10px rgba(60,64,67,.12);text-align:left;padding:0;color:inherit;transition:transform .16s ease,box-shadow .16s ease}
.mtk-gallery__card:hover{transform:translateY(-3px);box-shadow:0 8px 26px rgba(60,64,67,.18)}
.mtk-gallery__card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#f1f3f4}
.mtk-gallery__card--sold{border:1px solid red}
.mtk-gallery__card-body{display:block;padding:18px}
.mtk-gallery__card-title{display:block;font-size:1.15rem;font-weight:800}
.mtk-gallery__card-meta{display:block;margin-top:8px;color:#5f6368}
.mtk-gallery__badge{display:inline-flex;margin-top:12px;padding:6px 10px;border-radius:999px;background:#e6f4ea;color:#137333;font-size:.82rem;font-weight:800}
.mtk-gallery__badge--sold{background:#fce8e6;color:#a50e0e}
.mtk-gallery__overlay{position:fixed;inset:0;background:#fff;z-index:1000;overflow:auto;display:none}
.mtk-gallery__overlay[aria-hidden="false"]{display:block}
.mtk-gallery__close{position:fixed;top:18px;right:18px;width:48px;height:48px;border-radius:50%;border:0;background:#202124;color:#fff;cursor:pointer;font-size:1.5rem;z-index:1010;display:grid;place-items:center}
.mtk-gallery__detail{max-width:1200px;margin:auto;padding:86px 24px 36px;display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.8fr);gap:32px}
.mtk-gallery__detail img{width:100%;border-radius:28px;box-shadow:0 8px 28px rgba(60,64,67,.18);background:#f1f3f4}
.mtk-gallery__detail-title{font-size:clamp(2rem,4vw,4rem);line-height:1;margin:0 0 14px;letter-spacing:-.04em}

.mtk-gallery__facts{display:grid;gap:10px;margin:22px 0}
.mtk-gallery__fact{display:flex;justify-content:space-between;gap:18px;padding:13px 0;border-bottom:1px solid #e8eaed}
.mtk-gallery__actions{display:grid;grid-template-columns:max-content max-content;align-items:center;gap:12px 20px;margin-top:24px}
.mtk-gallery__link{border:0;background:transparent;color:#1a73e8;padding:8px 0;cursor:pointer;text-align:left;font-weight:800;text-decoration:underline}
.mtk-gallery__form{display:none;grid-column:1/-1;width:100%;max-width:100%;margin-top:18px;padding:28px;border:1px solid #e8eaed;border-radius:24px;background:#f8fafd;box-shadow:0 2px 10px rgba(60,64,67,.08)}
.mtk-gallery__form.is-open{display:grid;gap:18px}
.mtk-gallery__field{position:relative}

.mtk-gallery__field input[readonly]{background:#f1f3f4;color:#5f6368}
.mtk-gallery__field textarea{min-height:110px;resize:vertical}

.mtk-gallery__admin{max-width:1200px;margin:auto;padding:86px 24px 40px}

.mtk-gallery__editor-layout{display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:start}
.mtk-gallery__editor-preview{position:sticky;top:120px;border-radius:24px;overflow:hidden;background:#000;min-height:320px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(15,23,42,.14)}

this.root=root;
this.config=settings;
this.paintings=this.loadPaintings();
this.isAdmin=false;
this.editingId=null;
this.adminMode="list";
this._scrollHeaderBound=false;
this.render();
wc.subscribe("4-mtk-gallery",this.onMessage.bind(this));
this.publish("ready",{count:this.paintings.length});
}

loadPaintings(){
try{
const s=localStorage.getItem(STORAGE_KEY);
return s?JSON.parse(s):JSON.parse(JSON.stringify(this.config.paintings));
}catch(e){return JSON.parse(JSON.stringify(this.config.paintings));}
}

savePaintings(){
try{
localStorage.setItem(STORAGE_KEY,JSON.stringify(this.paintings));
this.publish("paintings:saved",{count:this.paintings.length});
}catch(error){
console.error(error);
alert("Storage limit reached. Use image paths like ./img/file.jpg instead of embedded image data.");
}
}

publish(action,payload){
const message={component:"mtk-gallery",action,date:new Date().toISOString(),...(payload||{})};
wc.log("mtk-gallery publish",message);
wc.publish("mtk-gallery",message);
}

onMessage(event){
const detail=event.detail||{};
wc.log("mtk-gallery received",detail);
if(detail.action==="refresh"){this.paintings=this.loadPaintings();this.renderHome();}
}

render(){
this.root.innerHTML=`<section class="mtk-gallery__shell" aria-label="Artwork gallery">
<header class="mtk-gallery__topbar">
<div class="mtk-gallery__topbar-inner">
<div>
<h1 class="mtk-gallery__title">${this.escape(this.config.store.title)}</h1>

<p class="mtk-gallery__header-description">${this.escape(this.config.store.headerDescription||"")}</p>
</div>
<button class="mtk-gallery__manage" type="button" data-action="open-admin">Manage Artwork</button>
</div>
</header>
<main class="mtk-gallery__grid" data-gallery-grid></main>
<footer class="mtk-gallery__footer" aria-label="Contact information">
<div class="mtk-gallery__footer-inner">
<small><strong>Contact me:</strong> <a href="mailto:${this.escape(this.config.store.contactEmail)}">${this.escape(this.config.store.contactEmail)}</a></small>
</div>
</footer>
</section>
<section class="mtk-gallery__overlay" aria-hidden="true" data-detail-overlay>
<button class="mtk-gallery__close" type="button" data-action="close-detail" aria-label="Close artwork detail">×</button>
<div data-detail-content></div>
</section>
<section class="mtk-gallery__overlay" aria-hidden="true" data-admin-overlay>
<button class="mtk-gallery__close" type="button" data-action="close-admin" aria-label="Close admin management">×</button>
<div class="mtk-gallery__admin" data-admin-content></div>
</section>`;
this.bindEvents();
this.renderHome();
this.renderAdmin();
this.bindScrollHeader();
}

bindScrollHeader(){
const topbar=this.root.querySelector(".mtk-gallery__topbar");
if(!topbar||this._scrollHeaderBound)return;
this._scrollHeaderBound=true;
let ticking=false;
const update=()=>{
const y=window.scrollY||0;
const start=8,end=120;
const progress=Math.min(1,Math.max(0,(y-start)/(end-start)));
const opacity=Math.max(0,1-progress);
const maxHeight=Math.round(260*(1-progress));
topbar.style.setProperty("--mtk-header-desc-opacity",opacity.toFixed(3));
topbar.style.setProperty("--mtk-header-desc-max",maxHeight+"px");
topbar.dataset.scrolled=progress>0.98?"true":"false";
ticking=false;
};
const requestUpdate=()=>{if(!ticking){ticking=true;window.requestAnimationFrame(update);}};
update();
window.addEventListener("scroll",requestUpdate,{passive:true});
}

bindEvents(){
this.root.addEventListener("click",e=>{
const action=e.target.closest("[data-action]");
if(action){
e.preventDefault();
e.stopPropagation();
this.handleAction(action.dataset.action,action.dataset.id);
return;
}
const card=e.target.closest("[data-painting-id]");
if(card)this.openDetail(card.dataset.paintingId);
});
this.root.addEventListener("submit",e=>{
e.preventDefault();
const form=e.target,type=form.dataset.form;
if(type==="offer")this.submitRecord(form,OFFERS_KEY,"offer:created","Offer saved locally.");
if(type==="request")this.submitRecord(form,REQUESTS_KEY,"request:created","Request saved locally.");
if(type==="login")this.login(form);
if(type==="painting")this.savePainting(form);
});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){this.closeDetail();this.closeAdmin();}});
}

handleAction(action,id){
if(action==="open-admin")this.openAdmin();
if(action==="close-admin")this.closeAdmin();
if(action==="close-detail")this.closeDetail();
if(action==="toggle-offer")this.toggleForm("offer-form");
if(action==="toggle-request")this.toggleForm("request-form");
if(action==="paypal")this.buyWithPayPal(id);
if(action==="new-painting")this.startNewPainting();
if(action==="edit-painting")this.editPainting(id);
if(action==="remove-painting")this.removePainting(id);
if(action==="cancel-edit")this.cancelEdit();
if(action==="export-gallery")this.exportGallery();
if(action==="logout")this.logout();
}

renderHome(){
const grid=this.root.querySelector("[data-gallery-grid]");
grid.innerHTML=this.paintings.map(p=>{
const sold=this.isSold(p);
return `<button class="mtk-gallery__card ${sold?"mtk-gallery__card--sold":""}" type="button" data-painting-id="${this.escape(p.id)}" aria-label="Open ${this.escape(p.title)} details">
<img src="${this.escape(p.image)}" alt="${this.escape(p.title)}" onerror="this.style.opacity='.18'">
<span class="mtk-gallery__card-body">
<span class="mtk-gallery__card-title">${this.escape(p.title)}</span>
<span class="mtk-gallery__card-meta">${this.money(p.price)} · ${this.escape(p.category)}</span>
<span class="mtk-gallery__badge ${sold?"mtk-gallery__badge--sold":""}">${sold?"Sold":"Available"}</span>
</span>
</button>`;
}).join("");
}

openDetail(id){
const p=this.paintings.find(item=>String(item.id)===String(id));
if(!p)return;
const sold=this.isSold(p);
const overlay=this.root.querySelector("[data-detail-overlay]");
const content=this.root.querySelector("[data-detail-content]");
content.innerHTML=`<article class="mtk-gallery__detail">
<div><img src="${this.escape(p.image)}" alt="${this.escape(p.title)}"></div>
<div>
<h2 class="mtk-gallery__detail-title">${this.escape(p.title)}</h2>
<p class="mtk-gallery__detail-desc">${this.escape(p.description)}</p>
<div class="mtk-gallery__facts">
${this.fact("Artwork ID",p.id)}${this.fact("Price",this.money(p.price))}${this.fact("Availability",sold?"Sold":"Available")}${this.fact("Dimensions",p.dimensions)}${this.fact("Medium",p.medium)}${this.fact("Category",p.category)}
</div>
<div class="mtk-gallery__actions">
${!sold?`<button class="mtk-gallery__primary" type="button" data-action="paypal" data-id="${this.escape(p.id)}">Buy with PayPal</button><button class="mtk-gallery__link" type="button" data-action="toggle-offer">Make me a counter offer</button>${this.offerForm(p)}`:`<button class="mtk-gallery__link" type="button" data-action="toggle-request">Request a similar painting</button>${this.requestForm(p)}`}
</div>
</div>
</article>`;
overlay.setAttribute("aria-hidden","false");
overlay.querySelector(".mtk-gallery__close").focus();
this.publish("detail:open",{id});
}

closeDetail(){const o=this.root.querySelector("[data-detail-overlay]");if(o)o.setAttribute("aria-hidden","true");}
fact(label,value){return`<div class="mtk-gallery__fact"><strong>${this.escape(label)}</strong><span>${this.escape(String(value))}</span></div>`;}
offerForm(p){return`<form class="mtk-gallery__form" data-form="offer" id="offer-form"><input type="hidden" name="paintingId" value="${this.escape(p.id)}">${this.field("name","Your name","text",true)}${this.field("email","Email","email",true)}${this.field("offer","Counter offer amount","number",true)}${this.textarea("message","Message",false)}<button class="mtk-gallery__primary" type="submit">Send offer</button></form>`;}
requestForm(p){return`<form class="mtk-gallery__form" data-form="request" id="request-form"><input type="hidden" name="paintingId" value="${this.escape(p.id)}">${this.field("name","Your name","text",true)}${this.field("email","Email","email",true)}${this.textarea("message","What would you like?",true)}<button class="mtk-gallery__primary" type="submit">Send request</button></form>`;}
toggleForm(id){const f=this.root.querySelector("#"+id);if(f)f.classList.toggle("is-open");}
submitRecord(form,key,eventName,notice){const d=Object.fromEntries(new FormData(form).entries()),list=JSON.parse(localStorage.getItem(key)||"[]");list.push({...d,createdAt:new Date().toISOString()});localStorage.setItem(key,JSON.stringify(list));form.reset();form.insertAdjacentHTML("beforeend",`<p class="mtk-gallery__notice">${notice}</p>`);this.publish(eventName,{paintingId:d.paintingId});}

buyWithPayPal(id){
const p=this.paintings.find(item=>String(item.id)===String(id));
if(!p)return;
const url=`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${encodeURIComponent(this.config.store.paypalSellerEmail)}&item_name=${encodeURIComponent(p.paypal.itemName||p.title)}&amount=${encodeURIComponent(String(p.price))}&currency_code=${encodeURIComponent(this.config.store.currency||"USD")}`;
this.publish("paypal:open",{id});
window.open(url,"_blank","noopener,noreferrer");
}

openAdmin(){
const o=this.root.querySelector("[data-admin-overlay]");
this.adminMode="list";
this.editingId=null;
o.setAttribute("aria-hidden","false");
this.renderAdmin();
o.querySelector(".mtk-gallery__close").focus();
this.publish("admin:open",{});
}
closeAdmin(){const o=this.root.querySelector("[data-admin-overlay]");if(o)o.setAttribute("aria-hidden","true");}

login(form){
const d=Object.fromEntries(new FormData(form).entries());
if(d.username===this.config.admin.username&&d.password===this.config.admin.password){
this.isAdmin=true;
this.editingId=null;
this.adminMode="list";
this.renderAdmin();
this.publish("admin:login",{});
}else{
const n=form.querySelector("[data-login-error]");
if(n)n.textContent="Invalid login.";
}
}

logout(){this.isAdmin=false;this.editingId=null;this.adminMode="list";this.renderAdmin();this.closeAdmin();window.scrollTo({top:0,behavior:"smooth"});this.publish("admin:logout",{});}

renderAdmin(){
const c=this.root.querySelector("[data-admin-content]");
if(!c)return;

if(!this.isAdmin){
c.innerHTML=`<div class="mtk-gallery__admin-head"><div><h2>Manage Artwork</h2><p>Login to add, edit, or remove paintings.</p></div></div><form class="mtk-gallery__login" data-form="login">${this.field("username","Username","text",true,"admin")}${this.field("password","Password","password",true,"test")}<button class="mtk-gallery__primary" type="submit">Login</button><p class="mtk-gallery__notice" data-login-error></p></form>`;
return;
}

if(this.adminMode==="form"){
c.innerHTML=`<div class="mtk-gallery__admin-head"><div><h2>${this.editingId?"Edit Artwork":"New Artwork"}</h2><p>${this.editingId?"Update the selected artwork.":"Create a fresh artwork item with an automatic Artwork ID."}</p></div><div class="mtk-gallery__actions"><button class="mtk-gallery__secondary" type="button" data-action="cancel-edit">Cancel</button><button class="mtk-gallery__secondary" type="button" data-action="logout">Logout</button></div></div><div class="mtk-gallery__editor"><div class="mtk-gallery__editor-layout"><div class="mtk-gallery__editor-preview">${this.renderEditorPreview()}</div>${this.paintingForm()}</div></div>`;
return;
}

c.innerHTML=`<div class="mtk-gallery__admin-head"><div><h2>Manage Artwork</h2><p>Select an artwork to edit or create a new artwork item.</p></div><div class="mtk-gallery__actions"><button class="mtk-gallery__primary" type="button" data-action="new-painting">New Artwork</button><button class="mtk-gallery__secondary" type="button" data-action="export-gallery">Export Gallery</button><button class="mtk-gallery__secondary" type="button" data-action="logout">Logout</button></div></div><div class="mtk-gallery__admin-list"><h3>Artwork List</h3>${this.paintings.map(p=>`<div class="mtk-gallery__admin-item"><img src="${this.escape(p.image)}" alt="${this.escape(p.title)}"><div><strong>${this.escape(p.title)}</strong><div>${this.escape(p.id)} · ${this.money(p.price)} · ${this.isSold(p)?"Sold":"Available"}</div></div><div class="mtk-gallery__admin-actions"><button class="mtk-gallery__secondary" type="button" data-action="edit-painting" data-id="${this.escape(p.id)}" aria-label="Edit ${this.escape(p.title)}">Edit</button><button class="mtk-gallery__danger" type="button" data-action="remove-painting" data-id="${this.escape(p.id)}">Remove</button></div></div>`).join("")}</div>`;
return;
}

renderEditorPreview(){
const editing=Boolean(this.editingId);
const p=editing?this.paintings.find(item=>String(item.id)===String(this.editingId)):null;
if(editing&&p&&p.image)return`<img src="${this.escape(p.image)}" alt="${this.escape(p.title)}">`;
return`<div class="mtk-gallery__editor-placeholder">NO IMAGE YET!</div>`;
}

paintingForm(){
const isEditing=Boolean(this.editingId);
const p=isEditing?this.paintings.find(item=>String(item.id)===String(this.editingId)):{id:this.generateArtworkId(),title:"",description:"",image:"",price:"",availability:"available",dimensions:"",medium:"",category:"",paypal:{itemName:"",sku:""}};
return`<form data-form="painting">
<input type="hidden" name="originalId" value="${this.escape(this.editingId||"")}">
<div class="mtk-gallery__editor-grid">
<div class="mtk-gallery__field"><label for="field-id">Artwork ID</label><input id="field-id" name="id" type="text" required readonly value="${this.escape(p.id)}"></div>
${this.field("title","Title","text",true,p.title)}
<div class="mtk-gallery__field mtk-gallery__field--wide"><label for="image">Image Path</label><input id="image" name="image" type="text" required pattern="^(\\./img/|img/|https?://).+" title="Use ./img/filename.jpg or a full https:// image URL" value="${this.escape(p.image)}"></div>
${this.field("price","Price","number",true,p.price)}
<div class="mtk-gallery__field"><label for="availability">Availability</label><select id="availability" name="availability" required><option value="available" ${!this.isSold(p)?"selected":""}>Available</option><option value="sold" ${this.isSold(p)?"selected":""}>Sold</option></select></div>
${this.field("dimensions","Dimensions","text",true,p.dimensions)}
${this.field("medium","Medium","text",true,p.medium)}
${this.field("category","Category","text",true,p.category)}
${this.field("paypalItemName","PayPal Item Name","text",true,p.paypal?.itemName||p.title)}
${this.field("paypalSku","PayPal SKU","text",true,p.paypal?.sku||p.id)}
<div class="mtk-gallery__field mtk-gallery__field--wide"><label for="description">Description</label><textarea id="description" name="description" required>${this.escape(p.description)}</textarea></div>
</div>
<div class="mtk-gallery__actions"><button class="mtk-gallery__primary" type="submit">${isEditing?"Save Artwork":"Create Artwork"}</button><button class="mtk-gallery__secondary" type="button" data-action="cancel-edit">Cancel</button></div>
</form>`;
}

savePainting(form){
const d=Object.fromEntries(new FormData(form).entries());
const painting={id:d.id,title:d.title,description:d.description,image:d.image,price:Number(d.price),availability:d.availability,dimensions:d.dimensions,medium:d.medium,category:d.category,paypal:{itemName:d.paypalItemName,sku:d.paypalSku}};
if(d.originalId)this.paintings=this.paintings.map(item=>String(item.id)===String(d.originalId)?painting:item);
else this.paintings.push(painting);
this.editingId=null;
this.adminMode="list";
this.savePaintings();
this.renderHome();
this.renderAdmin();
this.publish(d.originalId?"painting:updated":"painting:created",{id:painting.id});
}

startNewPainting(){this.editingId=null;this.adminMode="form";this.renderAdmin();this.publish("painting:new",{id:this.generateArtworkId()});}
editPainting(id){
const p=this.paintings.find(item=>String(item.id)===String(id));
if(!p){alert("Artwork not found for editing.");return;}
this.editingId=p.id;
this.adminMode="form";
this.renderAdmin();
const titleField=this.root.querySelector("[name=title]");
if(titleField)titleField.focus();
this.publish("painting:edit",{id:p.id});
}
cancelEdit(){this.editingId=null;this.adminMode="list";this.renderAdmin();}
removePainting(id){
const p=this.paintings.find(item=>String(item.id)===String(id));
if(!p)return;
if(!confirm(`Remove "${p.title}"? This cannot be undone.`))return;
this.paintings=this.paintings.filter(item=>String(item.id)!==String(id));
this.adminMode="list";
this.savePaintings();
this.renderHome();
this.renderAdmin();
this.publish("painting:remove",{id});
}

exportGallery(){
const clean=document.documentElement.cloneNode(true);
const gallery=clean.querySelector("mtk-gallery.mtk-gallery");
if(gallery){gallery.removeAttribute("data-initialized");gallery.innerHTML="";}
clean.querySelectorAll(".mtk-gallery__overlay").forEach(o=>o.setAttribute("aria-hidden","true"));
const cleanConfig={store:this.config.store,admin:this.config.admin,paintings:this.paintings};
let exported="<!DOCTYPE html>\n"+clean.outerHTML;
const configBlock=`const config = ${JSON.stringify(cleanConfig,null,2)};
const STORAGE_KEY="mtk-gallery-paintings-v4",OFFERS_KEY="mtk-gallery-offers-v4",REQUESTS_KEY="mtk-gallery-requests-v4";`;
exported=exported.replace(/const config = [\s\S]*?const STORAGE_KEY="mtk-gallery-paintings-v4",OFFERS_KEY="mtk-gallery-offers-v4",REQUESTS_KEY="mtk-gallery-requests-v4";/,configBlock);
exported=exported.replace(/<mtk-gallery class="mtk-gallery"[\s\S]*?<\/mtk-gallery>/,'<mtk-gallery class="mtk-gallery"></mtk-gallery>');
const blob=new Blob([exported],{type:"text/html;charset=utf-8"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="index.html";
document.body.appendChild(a);
a.click();
a.remove();
URL.revokeObjectURL(url);
this.closeAdmin();
this.publish("gallery:exported",{count:this.paintings.length});
}

generateArtworkId(){
const nums=this.paintings.map(p=>String(p.id||"").match(/ART-(\d+)/)).filter(Boolean).map(m=>Number(m[1]));
return"ART-"+((nums.length?Math.max(...nums):1000)+1);
}
field(name,label,type,required,value=""){const id="field-"+name;return`<div class="mtk-gallery__field"><label for="${this.escape(id)}">${this.escape(label)}</label><input id="${this.escape(id)}" name="${this.escape(name)}" type="${this.escape(type)}" ${required?"required":""} value="${this.escape(String(value??""))}"></div>`;}
textarea(name,label,required){const id="field-"+name;return`<div class="mtk-gallery__field"><label for="${this.escape(id)}">${this.escape(label)}</label><textarea id="${this.escape(id)}" name="${this.escape(name)}" ${required?"required":""}></textarea></div>`;}
money(v){return new Intl.NumberFormat("en-US",{style:"currency",currency:this.config.store.currency||"USD",maximumFractionDigits:0}).format(Number(v||0));}
isSold(p){return String(p.availability||"").toLowerCase()==="sold"||String(p.availability||"").toLowerCase()==="unavailable";}
escape(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
}

function init(){
const root=document.querySelector("mtk-gallery.mtk-gallery");
if(!root)return;
if(window.__mtkGalleryInitialized)return;
window.__mtkGalleryInitialized=true;
root.removeAttribute("data-initialized");
root.innerHTML="";
root.dataset.initialized="true";
new MTKGallery(root,config);
}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init,{once:true});
else init();
})();
</script>
</body>
</html>
