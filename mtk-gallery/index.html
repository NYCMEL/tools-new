<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madam Mina's Artwork</title>
<style>
:root {
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #fff;
  color: #202124;
}

button,
input,
textarea,
select {
  font: inherit;
}

.mtk-gallery {
  display: block;
  min-block-size: 100vh;
  background: #fff;
  color: #202124;
}

.mtk-gallery * {
  box-sizing: border-box;
}

.mtk-gallery__shell {
  max-inline-size: 1200px;
  margin-inline: auto;
  padding: 24px;
}

.mtk-gallery__topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-block-end: 28px;
}

.mtk-gallery__title {
  margin: 0;
  font-size: clamp(2rem, 4vw, 3.6rem);
  line-height: 1.05;
  font-weight: 800;
  letter-spacing: -0.04em;
}

.mtk-gallery__subtitle {
  margin: 10px 0 0;
  color: #5f6368;
  font-size: 1rem;
  max-inline-size: 680px;
}

.mtk-gallery__manage {
  border: 0;
  background: #1a73e8;
  color: #fff;
  padding: 12px 18px;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(26, 115, 232, 0.24);
  white-space: nowrap;
}

.mtk-gallery__manage:hover {
  background: #1558b0;
}

.mtk-gallery__manage:focus-visible,
.mtk-gallery button:focus-visible,
.mtk-gallery a:focus-visible,
.mtk-gallery input:focus-visible,
.mtk-gallery textarea:focus-visible,
.mtk-gallery select:focus-visible {
  outline: 3px solid #fbbc04;
  outline-offset: 3px;
}

.mtk-gallery__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
}

.mtk-gallery__card {
  border: 1px solid #e8eaed;
  border-radius: 24px;
  overflow: hidden;
  background: #fff;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(60, 64, 67, 0.12);
  transition: transform 160ms ease, box-shadow 160ms ease;
  text-align: left;
  padding: 0;
  color: inherit;
}

.mtk-gallery__card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 26px rgba(60, 64, 67, 0.18);
}

.mtk-gallery__card img {
  inline-size: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  display: block;
  background: #f1f3f4;
}

.mtk-gallery__card-body {
  padding: 18px;
}

.mtk-gallery__card-title {
  margin: 0;
  font-size: 1.15rem;
  font-weight: 800;
}

.mtk-gallery__card-meta {
  margin: 8px 0 0;
  color: #5f6368;
  font-size: 0.94rem;
}

.mtk-gallery__badge {
  display: inline-flex;
  margin-block-start: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #e6f4ea;
  color: #137333;
  font-size: 0.82rem;
  font-weight: 700;
}

.mtk-gallery__badge--off {
  background: #fce8e6;
  color: #a50e0e;
}

.mtk-gallery__overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #fff;
  overflow: auto;
  display: none;
}

.mtk-gallery__overlay[aria-hidden="false"] {
  display: block;
}

.mtk-gallery__close {
  position: fixed;
  inset-block-start: 18px;
  inset-inline-end: 18px;
  inline-size: 48px;
  block-size: 48px;
  border-radius: 50%;
  border: 0;
  background: #202124;
  color: #fff;
  cursor: pointer;
  font-size: 1.4rem;
  z-index: 1010;
  display: grid;
  place-items: center;
}

.mtk-gallery__detail {
  max-inline-size: 1200px;
  margin-inline: auto;
  padding: 86px 24px 36px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 0.8fr);
  gap: 32px;
}

.mtk-gallery__detail img {
  inline-size: 100%;
  border-radius: 28px;
  box-shadow: 0 8px 28px rgba(60, 64, 67, 0.18);
  background: #f1f3f4;
}

.mtk-gallery__detail-title {
  font-size: clamp(2rem, 4vw, 4rem);
  line-height: 1;
  margin: 0 0 14px;
  letter-spacing: -0.04em;
}

.mtk-gallery__detail-desc {
  font-size: 1.05rem;
  line-height: 1.65;
  color: #3c4043;
}

.mtk-gallery__facts {
  display: grid;
  gap: 10px;
  margin: 22px 0;
}

.mtk-gallery__fact {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  padding: 13px 0;
  border-block-end: 1px solid #e8eaed;
}

.mtk-gallery__fact strong {
  color: #5f6368;
}

.mtk-gallery__actions {
  display: grid;
  gap: 14px;
  margin-block-start: 24px;
}

.mtk-gallery__primary {
  border: 0;
  background: #1a73e8;
  color: #fff;
  padding: 14px 20px;
  border-radius: 14px;
  cursor: pointer;
  font-weight: 800;
  box-shadow: 0 2px 8px rgba(26, 115, 232, 0.24);
}

.mtk-gallery__link {
  border: 0;
  background: transparent;
  color: #1a73e8;
  padding: 8px 0;
  cursor: pointer;
  text-align: left;
  font-weight: 800;
  text-decoration: underline;
}

.mtk-gallery__form {
  display: none;
  margin-block-start: 16px;
  padding: 18px;
  border: 1px solid #e8eaed;
  border-radius: 20px;
  background: #f8fafd;
}

.mtk-gallery__form.is-open {
  display: grid;
  gap: 16px;
}

.mtk-gallery__field {
  position: relative;
}

.mtk-gallery__field input,
.mtk-gallery__field textarea,
.mtk-gallery__field select {
  inline-size: 100%;
  border: 1px solid #dadce0;
  border-radius: 12px;
  padding: 18px 14px 8px;
  background: #fff;
  color: #202124;
}

.mtk-gallery__field textarea {
  min-block-size: 110px;
  resize: vertical;
}

.mtk-gallery__field label {
  position: absolute;
  inset-block-start: 7px;
  inset-inline-start: 14px;
  color: #5f6368;
  font-size: 0.74rem;
  pointer-events: none;
}

.mtk-gallery__admin {
  max-inline-size: 1200px;
  margin-inline: auto;
  padding: 86px 24px 40px;
}

.mtk-gallery__admin-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-block-end: 24px;
}

.mtk-gallery__admin h2 {
  margin: 0;
  font-size: clamp(2rem, 4vw, 3.6rem);
  letter-spacing: -0.04em;
}

.mtk-gallery__login,
.mtk-gallery__editor,
.mtk-gallery__admin-list {
  border: 1px solid #e8eaed;
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 2px 10px rgba(60, 64, 67, 0.10);
  margin-block-end: 20px;
}

.mtk-gallery__editor-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.mtk-gallery__editor-grid .mtk-gallery__field--wide {
  grid-column: 1 / -1;
}

.mtk-gallery__admin-item {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 16px;
  align-items: center;
  border-block-end: 1px solid #e8eaed;
  padding: 14px 0;
}

.mtk-gallery__admin-item:last-child {
  border-block-end: 0;
}

.mtk-gallery__admin-item img {
  inline-size: 80px;
  block-size: 64px;
  object-fit: cover;
  border-radius: 12px;
  background: #f1f3f4;
}

.mtk-gallery__admin-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.mtk-gallery__danger {
  border: 1px solid #d93025;
  background: #fff;
  color: #d93025;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 800;
}

.mtk-gallery__secondary {
  border: 1px solid #dadce0;
  background: #fff;
  color: #202124;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 800;
}

.mtk-gallery__notice {
  margin: 12px 0 0;
  color: #137333;
  font-weight: 800;
}

@media (max-width: 760px) {
  .mtk-gallery__topbar,
  .mtk-gallery__admin-head {
    display: grid;
  }

  .mtk-gallery__detail {
    grid-template-columns: 1fr;
  }

  .mtk-gallery__editor-grid {
    grid-template-columns: 1fr;
  }

  .mtk-gallery__admin-item {
    grid-template-columns: 64px 1fr;
  }

  .mtk-gallery__admin-actions {
    grid-column: 1 / -1;
  }
}
</style>
</head>
<body>
<mtk-gallery class="mtk-gallery"></mtk-gallery>

<script>
(function () {
  "use strict";

  window.wc = window.wc || {};

  if (typeof window.wc.log !== "function") {
    window.wc.log = function () {
      if (window.console && typeof window.console.log === "function") {
        window.console.log.apply(window.console, arguments);
      }
    };
  }

  if (typeof window.wc.publish !== "function") {
    window.wc.publish = function (name, payload) {
      document.dispatchEvent(new CustomEvent(name, { detail: payload || {} }));
    };
  }

  if (typeof window.wc.subscribe !== "function") {
    window.wc.subscribe = function (name, handler) {
      document.addEventListener(name, handler);
      return function () {
        document.removeEventListener(name, handler);
      };
    };
  }

  const config = {
    store: {
      title: "Madam Mina's Artwork",
      subtitle: "Original hand-painted artwork for collectors, gifts, homes, offices, and personal spaces.",
      paypalSellerEmail: "seller@example.com",
      currency: "USD"
    },
    admin: {
      username: "admin",
      password: "test"
    },
    paintings: [
      {
        id: "mina-001",
        title: "Golden Garden",
        description: "Warm floral movement with soft gold tones and layered painterly texture.",
        image: "https://images.unsplash.com/photo-1578301978018-3005759f48f7?auto=format&fit=crop&w=1200&q=80",
        price: 450,
        availability: "available",
        dimensions: "24 x 30 in",
        medium: "Acrylic on canvas",
        category: "Floral",
        paypal: { itemName: "Golden Garden", sku: "mina-001" }
      },
      {
        id: "mina-002",
        title: "Blue Evening",
        description: "A calming abstract composition inspired by evening light and water.",
        image: "https://images.unsplash.com/photo-1547891654-e66ed7ebb968?auto=format&fit=crop&w=1200&q=80",
        price: 520,
        availability: "available",
        dimensions: "30 x 40 in",
        medium: "Oil on canvas",
        category: "Abstract",
        paypal: { itemName: "Blue Evening", sku: "mina-002" }
      },
      {
        id: "mina-003",
        title: "Quiet Village",
        description: "A cozy village scene with hand-painted architectural details.",
        image: "https://images.unsplash.com/photo-1579783928621-7a13d66a62d1?auto=format&fit=crop&w=1200&q=80",
        price: 610,
        availability: "unavailable",
        dimensions: "28 x 36 in",
        medium: "Mixed media",
        category: "Landscape",
        paypal: { itemName: "Quiet Village", sku: "mina-003" }
      },
      {
        id: "mina-004",
        title: "Red Bloom",
        description: "Bold red florals with expressive brushwork and rich contrast.",
        image: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?auto=format&fit=crop&w=1200&q=80",
        price: 390,
        availability: "available",
        dimensions: "20 x 24 in",
        medium: "Acrylic on canvas",
        category: "Floral",
        paypal: { itemName: "Red Bloom", sku: "mina-004" }
      },
      {
        id: "mina-005",
        title: "Morning Harbor",
        description: "A peaceful harbor study with soft reflected light and layered blues.",
        image: "https://images.unsplash.com/photo-1541961017774-22349e4a1262?auto=format&fit=crop&w=1200&q=80",
        price: 740,
        availability: "available",
        dimensions: "36 x 48 in",
        medium: "Oil on canvas",
        category: "Seascape",
        paypal: { itemName: "Morning Harbor", sku: "mina-005" }
      },
      {
        id: "mina-006",
        title: "Still Light",
        description: "A quiet still-life painting with elegant balance and warm shadows.",
        image: "https://images.unsplash.com/photo-1580136579312-94651dfd596d?auto=format&fit=crop&w=1200&q=80",
        price: 330,
        availability: "unavailable",
        dimensions: "18 x 24 in",
        medium: "Acrylic on board",
        category: "Still Life",
        paypal: { itemName: "Still Light", sku: "mina-006" }
      }
    ]
  };

  const STORAGE_KEY = "mtk-gallery-paintings-v1";
  const OFFERS_KEY = "mtk-gallery-offers-v1";
  const REQUESTS_KEY = "mtk-gallery-requests-v1";

  class MTKGallery {
    constructor(root, settings) {
      this.root = root;
      this.config = settings;
      this.paintings = this.loadPaintings();
      this.activePainting = null;
      this.isAdmin = false;
      this.editingId = null;
      this.boundOnMessage = this.onMessage.bind(this);
      this.render();
      wc.subscribe("4-mtk-gallery", this.boundOnMessage);
      this.publish("ready", { count: this.paintings.length });
    }

    loadPaintings() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : structuredClone(this.config.paintings);
      } catch (error) {
        return JSON.parse(JSON.stringify(this.config.paintings));
      }
    }

    savePaintings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.paintings));
      this.publish("paintings:saved", { count: this.paintings.length });
    }

    publish(action, payload) {
      const message = {
        component: "mtk-gallery",
        action,
        date: new Date().toISOString(),
        ...(payload || {})
      };
      wc.log("mtk-gallery publish", message);
      wc.publish("mtk-gallery", message);
    }

    onMessage(event) {
      const detail = event.detail || {};
      wc.log("mtk-gallery received", detail);
      if (detail.action === "refresh") {
        this.paintings = this.loadPaintings();
        this.renderHome();
      }
    }

    render() {
      this.root.innerHTML = `
        <section class="mtk-gallery__shell" aria-label="Artwork gallery">
          <header class="mtk-gallery__topbar">
            <div>
              <h1 class="mtk-gallery__title">${this.escape(this.config.store.title)}</h1>
              <p class="mtk-gallery__subtitle">${this.escape(this.config.store.subtitle)}</p>
            </div>
            <button class="mtk-gallery__manage" type="button" data-action="open-admin">Manage Artwork</button>
          </header>
          <main class="mtk-gallery__grid" data-gallery-grid></main>
        </section>

        <section class="mtk-gallery__overlay" aria-hidden="true" aria-label="Artwork detail" data-detail-overlay>
          <button class="mtk-gallery__close" type="button" data-action="close-detail" aria-label="Close artwork detail">×</button>
          <div data-detail-content></div>
        </section>

        <section class="mtk-gallery__overlay" aria-hidden="true" aria-label="Admin management" data-admin-overlay>
          <button class="mtk-gallery__close" type="button" data-action="close-admin" aria-label="Close admin management">×</button>
          <div class="mtk-gallery__admin" data-admin-content></div>
        </section>
      `;

      this.bindRootEvents();
      this.renderHome();
      this.renderAdmin();
    }

    bindRootEvents() {
      this.root.addEventListener("click", (event) => {
        const actionElement = event.target.closest("[data-action]");
        const card = event.target.closest("[data-painting-id]");

        if (actionElement) {
          const action = actionElement.dataset.action;
          const id = actionElement.dataset.id;
          this.handleAction(action, id, event);
          return;
        }

        if (card) {
          this.openDetail(card.dataset.paintingId);
        }
      });

      this.root.addEventListener("submit", (event) => {
        event.preventDefault();
        const form = event.target;
        const type = form.dataset.form;
        if (type === "offer") this.submitOffer(form);
        if (type === "request") this.submitRequest(form);
        if (type === "login") this.login(form);
        if (type === "painting") this.savePainting(form);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          this.closeDetail();
          this.closeAdmin();
        }
      });
    }

    handleAction(action, id, event) {
      if (action === "open-admin") this.openAdmin();
      if (action === "close-admin") this.closeAdmin();
      if (action === "close-detail") this.closeDetail();
      if (action === "toggle-offer") this.toggleForm("offer-form");
      if (action === "toggle-request") this.toggleForm("request-form");
      if (action === "paypal") this.buyWithPayPal(id);
      if (action === "new-painting") this.startNewPainting();
      if (action === "edit-painting") this.editPainting(id);
      if (action === "remove-painting") this.removePainting(id);
      if (action === "cancel-edit") this.cancelEdit();
      if (action === "logout") this.logout();
    }

    renderHome() {
      const grid = this.root.querySelector("[data-gallery-grid]");
      grid.innerHTML = this.paintings.map((painting) => `
        <button class="mtk-gallery__card" type="button" data-painting-id="${this.escape(painting.id)}" aria-label="Open ${this.escape(painting.title)} details">
          <img src="${this.escape(painting.image)}" alt="${this.escape(painting.title)}">
          <span class="mtk-gallery__card-body">
            <span class="mtk-gallery__card-title">${this.escape(painting.title)}</span>
            <span class="mtk-gallery__card-meta">${this.money(painting.price)} · ${this.escape(painting.category)}</span>
            <span class="mtk-gallery__badge ${painting.availability !== "available" ? "mtk-gallery__badge--off" : ""}">
              ${painting.availability === "available" ? "Available" : "Unavailable"}
            </span>
          </span>
        </button>
      `).join("");
    }

    openDetail(id) {
      const painting = this.paintings.find((item) => item.id === id);
      if (!painting) return;
      this.activePainting = painting;
      const overlay = this.root.querySelector("[data-detail-overlay]");
      const content = this.root.querySelector("[data-detail-content]");
      content.innerHTML = `
        <article class="mtk-gallery__detail">
          <div>
            <img src="${this.escape(painting.image)}" alt="${this.escape(painting.title)}">
          </div>
          <div>
            <h2 class="mtk-gallery__detail-title">${this.escape(painting.title)}</h2>
            <p class="mtk-gallery__detail-desc">${this.escape(painting.description)}</p>
            <div class="mtk-gallery__facts">
              ${this.fact("Price", this.money(painting.price))}
              ${this.fact("Availability", painting.availability === "available" ? "Available" : "Unavailable")}
              ${this.fact("Dimensions", painting.dimensions)}
              ${this.fact("Medium", painting.medium)}
              ${this.fact("Category", painting.category)}
            </div>
            <div class="mtk-gallery__actions">
              ${painting.availability === "available" ? `
                <button class="mtk-gallery__primary" type="button" data-action="paypal" data-id="${this.escape(painting.id)}">Buy with PayPal</button>
                <button class="mtk-gallery__link" type="button" data-action="toggle-offer">Make a counter offer</button>
                ${this.offerForm(painting)}
              ` : `
                <button class="mtk-gallery__link" type="button" data-action="toggle-request">Request a similar painting</button>
                ${this.requestForm(painting)}
              `}
            </div>
          </div>
        </article>
      `;
      overlay.setAttribute("aria-hidden", "false");
      overlay.querySelector(".mtk-gallery__close").focus();
      this.publish("detail:open", { id });
    }

    closeDetail() {
      const overlay = this.root.querySelector("[data-detail-overlay]");
      if (overlay) overlay.setAttribute("aria-hidden", "true");
    }

    fact(label, value) {
      return `<div class="mtk-gallery__fact"><strong>${this.escape(label)}</strong><span>${this.escape(String(value))}</span></div>`;
    }

    offerForm(painting) {
      return `
        <form class="mtk-gallery__form" data-form="offer" id="offer-form">
          <input type="hidden" name="paintingId" value="${this.escape(painting.id)}">
          ${this.field("name", "Your name", "text", true)}
          ${this.field("email", "Email", "email", true)}
          ${this.field("offer", "Counter offer amount", "number", true)}
          ${this.textarea("message", "Message", false)}
          <button class="mtk-gallery__primary" type="submit">Send offer</button>
        </form>
      `;
    }

    requestForm(painting) {
      return `
        <form class="mtk-gallery__form" data-form="request" id="request-form">
          <input type="hidden" name="paintingId" value="${this.escape(painting.id)}">
          ${this.field("name", "Your name", "text", true)}
          ${this.field("email", "Email", "email", true)}
          ${this.textarea("message", "What would you like?", true)}
          <button class="mtk-gallery__primary" type="submit">Send request</button>
        </form>
      `;
    }

    toggleForm(id) {
      const form = this.root.querySelector(`#${id}`);
      if (form) form.classList.toggle("is-open");
    }

    submitOffer(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const offers = JSON.parse(localStorage.getItem(OFFERS_KEY) || "[]");
      offers.push({ ...data, createdAt: new Date().toISOString() });
      localStorage.setItem(OFFERS_KEY, JSON.stringify(offers));
      form.reset();
      form.insertAdjacentHTML("beforeend", `<p class="mtk-gallery__notice">Offer saved locally.</p>`);
      this.publish("offer:created", { paintingId: data.paintingId });
    }

    submitRequest(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const requests = JSON.parse(localStorage.getItem(REQUESTS_KEY) || "[]");
      requests.push({ ...data, createdAt: new Date().toISOString() });
      localStorage.setItem(REQUESTS_KEY, JSON.stringify(requests));
      form.reset();
      form.insertAdjacentHTML("beforeend", `<p class="mtk-gallery__notice">Request saved locally.</p>`);
      this.publish("request:created", { paintingId: data.paintingId });
    }

    buyWithPayPal(id) {
      const painting = this.paintings.find((item) => item.id === id);
      if (!painting) return;
      const email = encodeURIComponent(this.config.store.paypalSellerEmail);
      const item = encodeURIComponent(painting.paypal.itemName || painting.title);
      const amount = encodeURIComponent(String(painting.price));
      const currency = encodeURIComponent(this.config.store.currency || "USD");
      const url = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${email}&item_name=${item}&amount=${amount}&currency_code=${currency}`;
      this.publish("paypal:open", { id });
      window.open(url, "_blank", "noopener,noreferrer");
    }

    openAdmin() {
      const overlay = this.root.querySelector("[data-admin-overlay]");
      overlay.setAttribute("aria-hidden", "false");
      this.renderAdmin();
      overlay.querySelector(".mtk-gallery__close").focus();
      this.publish("admin:open", {});
    }

    closeAdmin() {
      const overlay = this.root.querySelector("[data-admin-overlay]");
      if (overlay) overlay.setAttribute("aria-hidden", "true");
    }

    login(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      if (data.username === this.config.admin.username && data.password === this.config.admin.password) {
        this.isAdmin = true;
        this.renderAdmin();
        this.publish("admin:login", {});
      } else {
        const notice = form.querySelector("[data-login-error]");
        if (notice) notice.textContent = "Invalid login.";
      }
    }

    logout() {
      this.isAdmin = false;
      this.editingId = null;
      this.renderAdmin();
    }

    renderAdmin() {
      const content = this.root.querySelector("[data-admin-content]");
      if (!content) return;

      if (!this.isAdmin) {
        content.innerHTML = `
          <div class="mtk-gallery__admin-head">
            <div>
              <h2>Manage Artwork</h2>
              <p>Login to add, edit, or remove paintings.</p>
            </div>
          </div>
          <form class="mtk-gallery__login" data-form="login">
            ${this.field("username", "Username", "text", true)}
            ${this.field("password", "Password", "password", true)}
            <button class="mtk-gallery__primary" type="submit">Login</button>
            <p class="mtk-gallery__notice" data-login-error></p>
          </form>
        `;
        return;
      }

      content.innerHTML = `
        <div class="mtk-gallery__admin-head">
          <div>
            <h2>Manage Artwork</h2>
            <p>Add, edit, remove, and save artwork data locally for GitHub Pages.</p>
          </div>
          <button class="mtk-gallery__secondary" type="button" data-action="logout">Logout</button>
        </div>
        <div class="mtk-gallery__editor">
          <h3>${this.editingId ? "Edit Artwork" : "Add Artwork"}</h3>
          ${this.paintingForm()}
        </div>
        <div class="mtk-gallery__admin-list">
          <h3>Artwork List</h3>
          ${this.paintings.map((painting) => `
            <div class="mtk-gallery__admin-item">
              <img src="${this.escape(painting.image)}" alt="${this.escape(painting.title)}">
              <div>
                <strong>${this.escape(painting.title)}</strong>
                <div>${this.money(painting.price)} · ${this.escape(painting.availability)}</div>
              </div>
              <div class="mtk-gallery__admin-actions">
                <button class="mtk-gallery__secondary" type="button" data-action="edit-painting" data-id="${this.escape(painting.id)}">Edit</button>
                <button class="mtk-gallery__danger" type="button" data-action="remove-painting" data-id="${this.escape(painting.id)}">Remove</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    paintingForm() {
      const painting = this.editingId ? this.paintings.find((item) => item.id === this.editingId) : null;
      const p = painting || {
        id: "",
        title: "",
        description: "",
        image: "",
        price: "",
        availability: "available",
        dimensions: "",
        medium: "",
        category: "",
        paypal: { itemName: "", sku: "" }
      };

      return `
        <form data-form="painting">
          <input type="hidden" name="originalId" value="${this.escape(this.editingId || "")}">
          <div class="mtk-gallery__editor-grid">
            ${this.field("id", "Artwork ID", "text", true, p.id)}
            ${this.field("title", "Title", "text", true, p.title)}
            <div class="mtk-gallery__field mtk-gallery__field--wide">
              <label for="image">Image URL</label>
              <input id="image" name="image" type="url" required value="${this.escape(p.image)}">
            </div>
            ${this.field("price", "Price", "number", true, p.price)}
            <div class="mtk-gallery__field">
              <label for="availability">Availability</label>
              <select id="availability" name="availability" required>
                <option value="available" ${p.availability === "available" ? "selected" : ""}>Available</option>
                <option value="unavailable" ${p.availability === "unavailable" ? "selected" : ""}>Unavailable</option>
              </select>
            </div>
            ${this.field("dimensions", "Dimensions", "text", true, p.dimensions)}
            ${this.field("medium", "Medium", "text", true, p.medium)}
            ${this.field("category", "Category", "text", true, p.category)}
            ${this.field("paypalItemName", "PayPal Item Name", "text", true, p.paypal?.itemName || p.title)}
            ${this.field("paypalSku", "PayPal SKU", "text", true, p.paypal?.sku || p.id)}
            <div class="mtk-gallery__field mtk-gallery__field--wide">
              <label for="description">Description</label>
              <textarea id="description" name="description" required>${this.escape(p.description)}</textarea>
            </div>
          </div>
          <div class="mtk-gallery__actions">
            <button class="mtk-gallery__primary" type="submit">Save Artwork</button>
            ${this.editingId ? `<button class="mtk-gallery__secondary" type="button" data-action="cancel-edit">Cancel Editing</button>` : ""}
          </div>
        </form>
      `;
    }

    savePainting(form) {
      const data = Object.fromEntries(new FormData(form).entries());
      const painting = {
        id: data.id,
        title: data.title,
        description: data.description,
        image: data.image,
        price: Number(data.price),
        availability: data.availability,
        dimensions: data.dimensions,
        medium: data.medium,
        category: data.category,
        paypal: {
          itemName: data.paypalItemName,
          sku: data.paypalSku
        }
      };

      const originalId = data.originalId;
      if (originalId) {
        this.paintings = this.paintings.map((item) => item.id === originalId ? painting : item);
      } else {
        this.paintings.push(painting);
      }

      this.editingId = null;
      this.savePaintings();
      this.renderHome();
      this.renderAdmin();
    }

    startNewPainting() {
      this.editingId = null;
      this.renderAdmin();
    }

    editPainting(id) {
      this.editingId = id;
      this.renderAdmin();
      this.publish("painting:edit", { id });
    }

    cancelEdit() {
      this.editingId = null;
      this.renderAdmin();
    }

    removePainting(id) {
      const painting = this.paintings.find((item) => item.id === id);
      if (!painting) return;
      const ok = window.confirm(`Remove "${painting.title}"? This cannot be undone.`);
      if (!ok) return;
      this.paintings = this.paintings.filter((item) => item.id !== id);
      this.savePaintings();
      this.renderHome();
      this.renderAdmin();
      this.publish("painting:remove", { id });
    }

    field(name, label, type, required, value = "") {
      const id = `field-${name}`;
      return `
        <div class="mtk-gallery__field">
          <label for="${this.escape(id)}">${this.escape(label)}</label>
          <input id="${this.escape(id)}" name="${this.escape(name)}" type="${this.escape(type)}" ${required ? "required" : ""} value="${this.escape(String(value ?? ""))}">
        </div>
      `;
    }

    textarea(name, label, required) {
      const id = `field-${name}`;
      return `
        <div class="mtk-gallery__field">
          <label for="${this.escape(id)}">${this.escape(label)}</label>
          <textarea id="${this.escape(id)}" name="${this.escape(name)}" ${required ? "required" : ""}></textarea>
        </div>
      `;
    }

    money(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: this.config.store.currency || "USD",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    escape(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  }

  function init() {
    const root = document.querySelector("mtk-gallery.mtk-gallery");
    if (!root || root.dataset.initialized === "true") return;
    root.dataset.initialized = "true";
    new MTKGallery(root, config);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init, { once: true });
  } else {
    init();
  }
})();
</script>
</body>
</html>
