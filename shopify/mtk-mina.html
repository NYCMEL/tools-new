<mtk-mina class="mtk-mina" aria-label="Mina hand paintings shop">
  <section class="mtk-mina__shell" aria-labelledby="mtk-mina-title">
    <header class="mtk-mina__hero">
      <div>
        <p class="mtk-mina__eyebrow" data-mina-field="eyebrow">Original art shop</p>
        <h1 class="mtk-mina__title" id="mtk-mina-title" data-mina-field="title">Mina Hand Paintings</h1>
        <p class="mtk-mina__subtitle" data-mina-field="subtitle"></p>
      </div>
      <div class="mtk-mina__stats" aria-label="Inventory summary"></div>
    </header>

    <nav class="mtk-mina__filters" aria-label="Painting filters"></nav>

    <main class="mtk-mina__content">
      <section class="mtk-mina__grid" aria-label="Paintings list"></section>
      <p class="mtk-mina__empty" hidden></p>
    </main>
  </section>

  <dialog class="mtk-mina__dialog" aria-labelledby="mtk-mina-dialog-title">
    <form class="mtk-mina__dialog-card" method="dialog">
      <button class="mtk-mina__dialog-close" value="cancel" aria-label="Close dialog" type="submit">×</button>
      <div class="mtk-mina__dialog-body"></div>
    </form>
  </dialog>
</mtk-mina>
