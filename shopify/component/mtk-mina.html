<!-- mtk-mina.html — markup fragment, included via <wc-include> -->
<mtk-mina class="mtk-mina" role="region" aria-label="Hand paintings gallery">
  <header class="mtk-mina__header">
    <h1 class="mtk-mina__title" data-mtk-mina="title">Hand-Painted Originals</h1>
    <p class="mtk-mina__subtitle" data-mtk-mina="subtitle"></p>
  </header>

  <section class="mtk-mina__grid" data-mtk-mina="grid" aria-live="polite"></section>

  <!-- Detail overlay -->
  <div class="mtk-mina__overlay" data-mtk-mina="overlay" hidden role="dialog" aria-modal="true" aria-labelledby="mtk-mina-detail-title">
    <article class="mtk-mina__detail" data-mtk-mina="detail" tabindex="-1">
      <button class="mtk-mina__close" data-mtk-mina="close" aria-label="Close detail view">
        <span class="material-icons" aria-hidden="true">close</span>
      </button>
      <div class="mtk-mina__detail-body" data-mtk-mina="detail-body"></div>
    </article>
  </div>

  <!-- Toast -->
  <div class="mtk-mina__toast" data-mtk-mina="toast" role="status" aria-live="polite" hidden></div>
</mtk-mina>
