<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Madam Mina Admin</title>
  <link rel="stylesheet" href="mtk-mina.css">
</head>
<body class="mtk-mina-admin">
  <main class="mtk-mina-admin__shell">
    <section class="mtk-mina-admin__card" data-admin-login-panel>
      <img class="mtk-mina-admin__logo" src="images/madam-mina-logo.png" alt="Madam Mina Painter Logo">
      <h1>Admin Login</h1>
      <form data-admin-login-form>
        <label><span>Username</span><input type="text" autocomplete="username" data-admin-username required></label>
        <label><span>Password</span><input type="password" autocomplete="current-password" data-admin-password required></label>
        <button class="mtk-mina-admin__button" type="submit">Login</button>
      </form>
      <p class="mtk-mina-admin__notice" data-admin-login-notice aria-live="polite"></p>
    </section>

    <section class="mtk-mina-admin__panel" data-admin-dashboard hidden>
      <div class="mtk-mina-admin__toolbar">
        <a class="mtk-mina-admin__button mtk-mina-admin__button--ghost" href="index.html">View Shop</a>
        <button class="mtk-mina-admin__button mtk-mina-admin__button--ghost" type="button" data-admin-logout>Logout</button>
      </div>

      <h1>Manage Paintings</h1>
      <p class="mtk-mina-admin__notice">Client-side demo storage updates browser localStorage. The SQLite database file and PHP API starter are included for server-side integration.</p>

      <form data-admin-item-form>
        <div class="mtk-mina-admin__grid">
          <label><span>Title</span><input type="text" data-item-title required></label>
          <label><span>Image path</span><input type="text" data-item-image value="images/painting-01.svg" required></label>
          <label><span>Price</span><input type="number" min="1" step="1" data-item-price required></label>
          <label><span>Status</span><select data-item-status><option value="available">Available</option><option value="sold">Sold</option><option value="reserved">Reserved</option><option value="unavailable">Unavailable</option></select></label>
          <label><span>Medium</span><input type="text" data-item-medium value="Acrylic on canvas"></label>
          <label><span>Size</span><input type="text" data-item-size value="18 x 24 in"></label>
        </div>
        <label><span>Description</span><textarea data-item-description>Original hand painting by Madam Mina.</textarea></label>
        <button class="mtk-mina-admin__button" type="submit">Add Item</button>
      </form>
    </section>

    <section class="mtk-mina-admin__panel" data-admin-list-panel hidden>
      <h2>Current Items</h2>
      <div class="mtk-mina-admin__list" data-admin-items></div>
    </section>
  </main>

  <script src="mtk-mina.config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
