<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mtk-mina · Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <main class="admin">
    <section id="login" class="admin__login">
      <h1>Admin Login</h1>
      <form id="loginForm">
        <label>Username <input name="username" autocomplete="username" required /></label>
        <label>Password <input name="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit">Sign in</button>
        <p id="loginError" class="admin__error" hidden>Invalid credentials</p>
      </form>
    </section>

    <section id="dash" class="admin__dash" hidden>
      <header>
        <h1>Paintings</h1>
        <div>
          <button id="newBtn">+ New</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </header>
      <table>
        <thead><tr><th>Title</th><th>Price</th><th>Available</th><th></th></tr></thead>
        <tbody id="rows"></tbody>
      </table>

      <h2>Offers</h2>
      <table>
        <thead><tr><th>Item</th><th>Email</th><th>Offer</th><th>Message</th><th>Status</th><th></th></tr></thead>
        <tbody id="offers"></tbody>
      </table>
    </section>

    <dialog id="itemDialog">
      <form id="itemForm" method="dialog">
        <h2 id="dialogTitle">Item</h2>
        <input name="id" type="hidden" />
        <label>Title <input name="title" required /></label>
        <label>Description <textarea name="description"></textarea></label>
        <label>Medium <input name="medium" /></label>
        <label>Size <input name="size" /></label>
        <label>Year <input name="year" type="number" /></label>
        <label>Price <input name="price" type="number" step="0.01" required /></label>
        <label>Image URL <input name="image" required /></label>
        <label><input name="available" type="checkbox" /> Available</label>
        <menu>
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="submit">Save</button>
        </menu>
      </form>
    </dialog>
  </main>
  <script src="/admin/admin.js"></script>
</body>
</html>
