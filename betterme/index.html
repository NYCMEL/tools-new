<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>BetterMe Profile</title>
	<link rel="stylesheet" href="styles.css" />
    </head>

    <body>
	<div class="app">
	    <header class="topbar">
		<div class="brand-wrap">
		    <button class="circle-btn" aria-label="Go back">
			<span class="arrow">←</span>
		    </button>

		    <div class="brand">BetterMe</div>
		</div>

		<div class="page-title">My Profile</div>

		<div class="menu-wrap">
		    <button class="circle-btn" aria-label="Open menu">
			<span class="menu-icon">☰</span>
		    </button>
		</div>
	    </header>

	    <main class="main">
		<section class="goal-card">
		    <h1>What’s your main goal?</h1>

		    <div class="choices">
			<button class="choice is-selected" type="button">
			    <span>Lose weight</span>
			    <span class="radio">✓</span>
			</button>

			<button class="choice" type="button">
			    <span>Gain muscle mass</span>
			    <span class="radio"></span>
			</button>
		    </div>
		</section>
	    </main>
	</div>

	<script src="app.js"></script>
    </body>
</html>
