<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>BetterMe Style Quiz</title>
	<link rel="stylesheet" href="scss/styles.css" />
    </head>

    <body>
	<div class="app">
	    <header class="app-header">
		<button class="circle-btn js-back" type="button" aria-label="Back">←</button>
		<div class="brand">BetterMe</div>
		<div class="header-title js-header-title"></div>
		<button class="circle-btn" type="button" aria-label="Menu">
		    <span class="menu-icon"></span>
		</button>
	    </header>

	    <div class="progress">
		<div class="app-progress-bar progress-bar js-progress-bar" style="border:1px lime dashed;width:10%;height:15px;"></div>
	    </div>

	    <main class="app-main screen js-screen" style="border:1px red dashed;width:100%;">
		<h1>MAIN</h1>
	    </main>
	    
	    <footer class="app-footer js-footer" style="display:block;text-align:center;">
		<button class="continue-btn js-continue" type="button">CONTINUE</button>
	    </footer>
	</div>

	<script src="js/config.js"></script>
	<script src="js/app.js"></script>
    </body>
</html>
