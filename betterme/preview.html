<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetterMe Profile</title>

  <style>
    :root {
      --bg: #fbf7ef;
      --text: #261207;
      --muted: #d8cec2;
      --card: #f1ebe2;
      --border: #e9dfd2;
      --dark: #321c12;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      height: 94px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 54px;
      border-bottom: 5px solid #f0ebe3;
      position: relative;
    }

    .topbar::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 88px;
      height: 5px;
      background: var(--dark);
      border-radius: 0 4px 4px 0;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .brand {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -2px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
    }

    .circle-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--text);
    }

    .circle-btn svg {
      width: 26px;
      height: 26px;
      stroke-width: 2.4;
    }

    .menu-wrap {
      display: flex;
      justify-content: flex-end;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      height: 5px;
      background: transparent;
    }

    .progress span {
      background: #f0ebe3;
    }

    .progress span:first-child {
      background: var(--dark);
      border-radius: 0 4px 4px 0;
    }

    main {
      padding-top: 72px;
      display: flex;
      justify-content: center;
    }

    .panel {
      width: min(635px, calc(100% - 40px));
      text-align: center;
    }

    h1 {
      margin: 0 0 44px;
      font-size: 44px;
      line-height: 1.1;
      letter-spacing: -1.5px;
      font-weight: 800;
    }

    .choices {
      display: grid;
      gap: 18px;
    }

    .choice {
      width: 100%;
      min-height: 84px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: transparent;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 23px;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .choice.is-selected {
      background: var(--card);
      border-color: transparent;
    }

    .radio {
      width: 29px;
      height: 29px;
      border-radius: 50%;
      border: 1.5px solid #d5cbbf;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .choice.is-selected .radio {
      background: var(--dark);
      border-color: var(--dark);
    }

    .check {
      display: none;
      width: 15px;
      height: 15px;
      color: #fff;
    }

    .choice.is-selected .check {
      display: block;
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 0 20px;
      }

      .brand {
        font-size: 28px;
      }

      h1 {
        font-size: 34px;
      }

      .choice {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <button class="circle-btn" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M15 18l-6-6 6-6"></path>
            <path d="M9 12h12"></path>
          </svg>
        </button>

        <div class="brand">BetterMe</div>
      </div>

      <div class="title">My Profile</div>

      <div class="menu-wrap">
        <button class="circle-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M5 7h14"></path>
            <path d="M5 12h14"></path>
            <path d="M5 17h14"></path>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="panel">
        <h1>What’s your main goal?</h1>

        <div class="choices">
          <button class="choice is-selected" type="button">
            <span>Lose weight</span>
            <span class="radio">
              <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </button>

          <button class="choice" type="button">
            <span>Gain muscle mass</span>
            <span class="radio">
              <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const choices = document.querySelectorAll(".choice");

    choices.forEach((choice) => {
      choice.addEventListener("click", () => {
        choices.forEach((item) => item.classList.remove("is-selected"));
        choice.classList.add("is-selected");
      });
    });
  </script>
</body>
</html>
