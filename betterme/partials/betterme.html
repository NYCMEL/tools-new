<betterme class="betterme">
  <div class="betterme__shell" data-betterme-shell>
    <header class="betterme__header app-header" data-betterme-header>
      <button class="betterme__icon-button app-header__back" type="button" data-betterme-back></button>
      <div class="betterme__brand" data-betterme-brand></div>
      <div class="betterme__header-title" data-betterme-header-title></div>
      <button class="betterme__icon-button app-header__menu" type="button" data-betterme-menu>
        <span class="betterme__menu-icon" aria-hidden="true"></span>
      </button>
    </header>
    <div class="betterme__progress" data-betterme-progress>
      <div class="betterme__progress-bar" data-betterme-progress-bar></div>
    </div>
    <main class="betterme__main app-main" data-betterme-main></main>
    <footer class="betterme__footer app-footer" data-betterme-footer>
      <button class="betterme__continue" type="button" data-betterme-continue></button>
    </footer>
  </div>
</betterme>
