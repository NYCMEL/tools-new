########################################################
# Global headers (applied to all sites)
########################################################
<IfModule mod_headers.c>
    # Allow cross-origin requests
    Header always set Access-Control-Allow-Origin "*"

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    # Disable HSTS so browsers can fallback to HTTP if needed (dev)
    Header always set Strict-Transport-Security "max-age=0"
</IfModule>

########################################################
# HTTP fallback (optional for local dev)
########################################################
<VirtualHost *:80>
    ServerName melify.local
    ServerAlias www.melify.com emphora.local twitter.local wc.local dropbox.local bookmarker.local

    # Redirect all HTTP traffic to HTTPS
    Redirect "/" "https://melify.local/"
</VirtualHost>

########################################################
# HTTPS sites
########################################################

# MELIFY
<VirtualHost *:443>
    ServerName www.melify.com
    ServerAlias melify.local

    DocumentRoot /Melify/tools/melify.local

    SSLEngine on
    SSLCertificateFile /Melify/tools/ssl/melify.local+11.pem
    SSLCertificateKeyFile /Melify/tools/ssl/melify.local+11-key.pem
</VirtualHost>

# DROPBOX
<VirtualHost *:443>
    ServerName dropbox.melify.com
    ServerAlias dropbox.local

    DocumentRoot /Melify/tools/dropbox.local

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    <Directory "/Users/melify/Dropbox">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /Melify/tools/ssl/melify.local+11.pem
    SSLCertificateKeyFile /Melify/tools/ssl/melify.local+11-key.pem
</VirtualHost>

